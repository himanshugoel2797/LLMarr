# Example LLMarr config. Copy to the path in $LLMARR_CONFIG (default
# ~/.config/llmarr/config.yaml) or just configure everything through the MCP
# tools — this file is written/updated by the server itself.

# single_host = true (default): LLMarr, qBittorrent and Plex share the same
# paths, so path_mappings can be left empty. Set false only for split containers.
single_host: true

server:
  # HTTP transport auth. A single static bearer token = a persistent login,
  # auto-generated on first HTTP start if left null. stdio needs no token.
  auth_token: null
  require_auth: true
  # "token" (static bearer, default) | "oauth" (OAuth 2.1 + PKCE, needed by
  # claude.ai custom connectors / mobile apps) | "none".
  auth_mode: token
  # External base URL, needed in oauth mode to build endpoint URLs. If null it is
  # derived from the request Host + X-Forwarded-Proto (fine behind a tunnel).
  public_url: null
  # oauth_signing_key is generated automatically on first oauth start.
  oauth_signing_key: null

metadata:
  provider: tmdb
  tmdb_api_key: null        # get a free v3 key from themoviedb.org
  language: en-US

prowlarr:
  url: http://prowlarr:9696
  api_key: null
  indexer_ids: []           # empty = search all configured indexers

download_clients:
  qbit:
    type: qbittorrent
    url: http://qbittorrent:8080
    username: admin
    password: null
    category: llmarr
    save_path: /downloads   # path AS QBITTORRENT SEES IT
default_download_client: qbit

plex:
  url: http://plex:32400
  token: null               # X-Plex-Token
  tv_section: TV Shows
  movie_section: Movies

# Leave empty when single_host is true. For split containers set single_host
# false and describe the same physical dir as each container sees it; entries in
# a group are equivalent.
path_mappings: []
#  - {group: dl, context: qbittorrent, path: /downloads}
#  - {group: dl, context: plex,        path: /data/torrents}
#  - {group: dl, context: local,       path: /mnt/media/dl}

root_folders:
  - {name: tv-main, media_type: tv, context: local, path: /mnt/media/tv}

quality:
  preferred_resolutions: [1080p, 720p]
  required_terms: []
  ignored_terms: [cam, ts, telesync]
  prefer_terms: [web-dl, webrip, bluray, x265, hevc]
  min_seeders: 1
  min_size_mb: 0
  max_size_mb: 0

rss:
  enabled: true
  interval_minutes: 30
  auto_grab: true

importer:
  enabled: true
  mode: hardlink            # hardlink | copy | move
  rename: true             # Sonarr/Radarr-style file naming
  work_context: local      # the namespace LLMarr itself can read/write
  min_video_mb: 50         # skip samples / stray small files
